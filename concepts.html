<style>
/* ===== 概念地图页专属样式 ===== */
.concept-hero {
  text-align: center; padding: 56px 24px 40px;
}
.concept-hero h1 { font-size: 34px; line-height: 1.3; margin-bottom: 12px; }
.concept-hero .subtitle { color: var(--text-secondary); font-size: 17px; }
.concept-hero .desc {
  max-width: 640px; margin: 16px auto 0; color: var(--text-secondary);
  font-size: 14px; line-height: 1.9;
}
.concept-overview {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 24px 28px; margin-bottom: 48px; box-shadow: var(--shadow);
}
.concept-overview .ov-title {
  font-size: 14px; font-weight: 600; color: var(--text-secondary);
  margin-bottom: 14px; letter-spacing: 1px;
}
.chip-cloud { display: flex; flex-wrap: wrap; gap: 10px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px; font-size: 14px;
  text-decoration: none; border: 1px solid var(--border);
  background: var(--tag-bg); color: var(--text);
  transition: all 0.2s;
}
.chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.chip:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.chip.c-blue:hover   { border-color: var(--blue);   color: var(--blue); }
.chip.c-green:hover  { border-color: var(--green);  color: var(--green); }
.chip.c-accent:hover { border-color: var(--accent); color: var(--accent); }
.chip.c-purple:hover { border-color: var(--purple); color: var(--purple); }
.chip.c-blue .dot   { background: var(--blue); }
.chip.c-green .dot  { background: var(--green); }
.chip.c-accent .dot { background: var(--accent); }
.chip.c-purple .dot { background: var(--purple); }
.domain { margin-bottom: 56px; }
.domain-head { margin-bottom: 20px; padding-left: 14px; border-left: 4px solid; }
.domain-head h2 { font-size: 24px; line-height: 1.4; }
.domain-head .domain-sub { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
.domain.d-blue   .domain-head { border-color: var(--blue); }
.domain.d-green  .domain-head { border-color: var(--green); }
.domain.d-accent .domain-head { border-color: var(--accent); }
.domain.d-purple .domain-head { border-color: var(--purple); }
.domain.d-blue   .domain-head h2 { color: var(--blue); }
.domain.d-green  .domain-head h2 { color: var(--green); }
.domain.d-accent .domain-head h2 { color: var(--accent); }
.domain.d-purple .domain-head h2 { color: var(--purple); }
.domain-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  align-items: start;
}
.concept-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  box-shadow: var(--shadow); overflow: hidden;
  transition: box-shadow 0.2s;
  scroll-margin-top: 76px;
}
.concept-card:hover { box-shadow: var(--shadow-md); }
.concept-card[open] { box-shadow: var(--shadow-md); }
.concept-card summary {
  list-style: none; cursor: pointer; padding: 20px 22px;
  user-select: none; position: relative;
}
.concept-card summary::-webkit-details-marker { display: none; }
.concept-card summary .num {
  display: inline-block; font-size: 12px; font-weight: 700;
  padding: 2px 10px; border-radius: 12px; margin-bottom: 10px;
  color: #fff;
}
.d-blue   .concept-card summary .num { background: var(--blue); }
.d-green  .concept-card summary .num { background: var(--green); }
.d-accent .concept-card summary .num { background: var(--accent); }
.d-purple .concept-card summary .num { background: var(--purple); }
.concept-card summary h3 { font-size: 19px; margin-bottom: 6px; line-height: 1.4; }
.concept-card summary .brief {
  color: var(--text-secondary); font-size: 14px; line-height: 1.7;
}
.concept-card summary .expand-hint {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 12px; font-size: 13px; color: var(--text-secondary);
}
.concept-card summary .expand-hint .arrow { transition: transform 0.25s; font-size: 11px; }
.concept-card[open] summary .expand-hint .arrow { transform: rotate(180deg); }
.d-blue   .concept-card summary .expand-hint { color: var(--blue); }
.d-green  .concept-card summary .expand-hint { color: var(--green); }
.d-accent .concept-card summary .expand-hint { color: var(--accent); }
.d-purple .concept-card summary .expand-hint { color: var(--purple); }
.concept-card .views { padding: 0 22px 22px; }
.master-quote {
  border-left: 3px solid; border-radius: 0 8px 8px 0;
  background: var(--tag-bg); padding: 12px 14px; margin-bottom: 12px;
}
.master-quote:last-child { margin-bottom: 0; }
.d-blue   .master-quote { border-color: var(--blue); }
.d-green  .master-quote { border-color: var(--green); }
.d-accent .master-quote { border-color: var(--accent); }
.d-purple .master-quote { border-color: var(--purple); }
.master-quote .who { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.master-quote .who .stance {
  font-weight: 400; font-size: 12px; color: var(--text-secondary); margin-left: 4px;
}
.master-quote .say { font-size: 14px; line-height: 1.8; color: var(--text); }
.master-quote .go {
  display: inline-block; margin-top: 6px; font-size: 13px;
  text-decoration: none; font-weight: 500;
}
.d-blue   .master-quote .go { color: var(--blue); }
.d-green  .master-quote .go { color: var(--green); }
.d-accent .master-quote .go { color: var(--accent); }
.d-purple .master-quote .go { color: var(--purple); }
.master-quote .go:hover { text-decoration: underline; }
@media (max-width: 900px) {
  .domain-grid { grid-template-columns: 1fr; }
  .concept-hero h1 { font-size: 28px; }
}
</style>

<script src="assets/js/data_v2.js"></script>
<script>
(function() {
  'use strict';

  // 域配置
  var DOMAIN_CONFIG = {
    valuation:   { cls:'d-blue',   title:'Ⅰ · 估值',              sub:'一家企业到底值多少钱？如何在价格与价值的缝隙中生存' },
    business:    { cls:'d-green',  title:'Ⅱ · 竞争与企业',        sub:'什么样的企业值得长期持有？在哪里下注、如何看懂生意本身' },
    cycle:       { cls:'d-accent', title:'Ⅲ · 周期与市场',    sub:'风险不是波动，是你不知道的东西——以及周期与极端事件的逻辑' },
    mind:        { cls:'d-purple', title:'Ⅳ · 心理与行为',        sub:'投资者最大的敌人是自己——偏误、逆向与仓位的艺术' },
    uncertainty: { cls:'d-accent', title:'Ⅴ · 不确定性与风险',    sub:'黑天鹅、反脆弱——以及如何在未知中构建韧性' }
  };

  var STANCE_MAP = { proponent:'支持者', extender:'发展者', critic:'批评者', neutral:'参考' };

  // 从 AppDataV2 获取概念列表（优先）或降级到旧 data.js
  function getConcepts() {
    if (typeof AppDataV2 !== 'undefined' && AppDataV2.CONCEPTS) return AppDataV2.CONCEPTS;
    if (typeof AppData !== 'undefined' && AppData.CONCEPTS) return AppData.CONCEPTS;
    return [];
  }

  function getConceptBooks(conceptId) {
    if (typeof AppDataV2 !== 'undefined' && AppDataV2.getConceptBooks) {
      return AppDataV2.getConceptBooks(conceptId);
    }
    // 降级：从旧 CONCEPTS.books[] 构建
    var concepts = AppData.CONCEPTS;
    var concept = null;
    for (var i = 0; i < concepts.length; i++) {
      if (concepts[i].id === conceptId) { concept = concepts[i]; break; }
    }
    if (!concept || !concept.books) return [];
    return concept.books.map(function(slug) {
      var meta = AppData.BOOK_META[slug];
      return {
        slug: slug,
        title: meta ? meta.title : slug,
        author: { nameCN: meta ? meta.title : slug },
        chapters: [],
        usage: '',
        stance: 'neutral'
      };
    });
  }

  var concepts = getConcepts();
  var bookCount = Object.keys(typeof AppDataV2 !== 'undefined' && AppDataV2.BOOK_REGISTRY ?
    AppDataV2.BOOK_REGISTRY : (AppData.BOOK_META || {})).length;

  // 更新 hero 副标题
  document.getElementById('heroSubtitle').textContent =
    bookCount + '本书 · ' + concepts.length + '个核心概念 · 每个概念的多维视角';

  // 按域分组
  var domainMap = {};
  concepts.forEach(function(c) {
    if (!domainMap[c.domain]) domainMap[c.domain] = [];
    domainMap[c.domain].push(c);
  });

  // 域排序
  var DOMAIN_ORDER = ['valuation', 'business', 'cycle', 'mind', 'uncertainty'];
  var conceptIdx = 1;

  // 渲染 chip cloud
  var chipCloud = document.getElementById('chipCloud');
  var classMap = { valuation:'c-blue', business:'c-green', cycle:'c-accent', mind:'c-purple', uncertainty:'c-accent' };
  concepts.forEach(function(c) {
    var cls = classMap[c.domain] || 'c-blue';
    chipCloud.innerHTML += '<a class="chip ' + cls + '" href="#c-' + c.id + '"><span class="dot"></span>' + c.name + '</a>';
  });

  // 渲染域名
  var container = document.getElementById('domainsContainer');
  var globalIdx = 0;

  DOMAIN_ORDER.forEach(function(dk) {
    var concepts = domainMap[dk];
    if (!concepts || concepts.length === 0) return;
    var dc = DOMAIN_CONFIG[dk] || DOMAIN_CONFIG.valuation;

    var html = '<section class="domain ' + dc.cls + '" id="domain-' + dk + '" aria-labelledby="dt-' + dk + '">';
    html += '<div class="domain-head"><h2 id="dt-' + dk + '">' + dc.title + '</h2>';
    html += '<p class="domain-sub">' + dc.sub + '</p></div>';
    html += '<div class="domain-grid">';

    concepts.forEach(function(c, idx) {
      globalIdx++;
      html += '<details class="concept-card" id="c-' + c.id + '">';
      html += '<summary>';
      html += '<span class="num">概念 ' + String(globalIdx).padStart(2, '0') + '</span>';
      html += '<h3>' + c.name + '</h3>';
      html += '<p class="brief">' + c.brief + '</p>';

      // 获取引用此书概念的各书信息
      var books = getConceptBooks(c.id);
      var countText = books.length + ' 位大师的视角';
      if (books.length === 1) countText = '1 位大师的视角';

      html += '<span class="expand-hint">' + countText + ' <span class="arrow">▼</span></span>';
      html += '</summary><div class="views">';

      // 渲染每本书的引用
      books.forEach(function(b) {
        var stance = STANCE_MAP[b.stance] || '';
        html += '<div class="master-quote">';
        html += '<div class="who">' + (b.author ? b.author.nameCN : b.title);
        if (stance) html += '<span class="stance">《' + b.title + '》· ' + stance + '</span>';
        else html += '<span class="stance">《' + b.title + '》</span>';
        html += '</div>';
        html += '<p class="say">' + (b.usage || '（详见书中相关章节）') + '</p>';
        html += '<a class="go" href="books/' + b.slug + '/">→ 深入阅读</a>';
        html += '</div>';
      });

      // 如果没有书籍数据，显示通用提示
      if (books.length === 0) {
        html += '<div class="master-quote"><p class="say" style="color:var(--text-secondary);">此概念尚未关联具体书籍的解读，待数据填充后自动呈现。</p></div>';
      }

      html += '</div></details>';
    });

    html += '</div></section>';
    container.innerHTML += html;
  });

  // 点击 chip 自动展开对应卡片
  document.querySelectorAll('.chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      var target = document.querySelector(chip.getAttribute('href'));
      if (target && target.tagName === 'DETAILS') target.open = true;
    });
  });

  // URL 锚点自动展开
  if (location.hash) {
    var t = document.querySelector(location.hash);
    if (t && t.tagName === 'DETAILS') t.open = true;
  }
})();
</script>
