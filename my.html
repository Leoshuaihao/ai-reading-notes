<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>我的书架 — AI精读笔记</title>
<meta name="description" content="你的阅读足迹与投资体系：追踪16本投资经典的阅读进度，汇聚你收藏的投资原则。"/>
<link rel="stylesheet" href="assets/css/style.css"/>
<style>
  /* ===== 页面骨架 ===== */
  .my-container { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

  /* ===== Hero ===== */
  .my-hero {
    text-align: center; padding: 48px 24px 36px;
  }
  .my-hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .my-hero .subtitle { color: var(--text-secondary); font-size: 16px; }

  /* ===== 统计条 ===== */
  .stats-bar {
    display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 24px 32px; margin-bottom: 40px; box-shadow: var(--shadow);
  }
  .stats-bar .stat-item { text-align: center; }
  .stats-bar .stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
  .stats-bar .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

  /* ===== 区块标题 ===== */
  .my-section-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .my-section-desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }

  /* ===== 阅读进度网格 ===== */
  .progress-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px; margin-bottom: 56px;
  }
  .progress-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; box-shadow: var(--shadow); transition: all 0.25s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .progress-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
  .progress-card .book-title { font-size: 15px; font-weight: 700; line-height: 1.4; }
  .progress-card .progress-track {
    height: 8px; background: var(--tag-bg); border-radius: 4px; overflow: hidden;
  }
  .progress-card .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), #e08a5f);
    border-radius: 4px; transition: width 0.5s ease;
  }
  .progress-card .progress-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--text-secondary);
  }
  .progress-card .continue-link {
    color: var(--accent); text-decoration: none; font-weight: 600; font-size: 13px;
  }
  .progress-card .continue-link:hover { text-decoration: underline; }
  .progress-card.not-started { opacity: 0.72; }
  .progress-card.not-started .book-title { color: var(--text-secondary); }
  .progress-card.not-started .continue-link { color: var(--text-secondary); font-weight: 500; }
  .progress-card .status-text { font-size: 12px; color: #b0b0b0; }

  /* ===== 我的投资体系 ===== */
  .principles-section { margin-bottom: 56px; }
  .principle-group {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 24px; margin-bottom: 16px; box-shadow: var(--shadow);
  }
  .principle-group .group-title {
    font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .principle-group .group-title .count {
    background: var(--accent-light); color: var(--accent); font-size: 12px;
    padding: 1px 10px; border-radius: 10px; font-weight: 600;
  }
  .principle-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 14px; line-height: 1.7;
  }
  .principle-item:last-child { border-bottom: none; }
  .principle-item .star { color: var(--gold); flex-shrink: 0; font-size: 14px; margin-top: 2px; }
  .principle-item .p-text { flex: 1; }
  .principle-item .p-chapter { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }
  .principle-item .remove-btn {
    background: none; border: none; color: #c0c0c0; font-size: 16px; cursor: pointer;
    padding: 0 4px; line-height: 1.4; flex-shrink: 0; font-family: inherit;
    border-radius: 4px; transition: all 0.15s;
  }
  .principle-item .remove-btn:hover { color: var(--accent); background: var(--accent-light); }

  /* 导出按钮 */
  .export-btn {
    display: inline-block; background: var(--accent); color: #fff; border: none;
    padding: 12px 32px; border-radius: 24px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.2s; margin-top: 8px;
  }
  .export-btn:hover { background: #b04f30; }
  .export-btn.copied { background: var(--green); }

  /* 空状态 */
  .empty-state {
    background: var(--card); border: 2px dashed var(--border); border-radius: 12px;
    padding: 32px 28px; text-align: center;
  }
  .empty-state .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .empty-state .empty-desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }
  .empty-state .sample-list { text-align: left; max-width: 560px; margin: 0 auto 20px; }
  .empty-state .sample-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
    color: #a8a8a8; font-size: 13px; line-height: 1.7;
  }
  .empty-state .sample-item .star { color: #d8c89a; flex-shrink: 0; margin-top: 2px; }
  .empty-state .sample-item .sample-tag {
    background: var(--tag-bg); color: #b0b0b0; font-size: 11px; padding: 1px 8px;
    border-radius: 8px; flex-shrink: 0; margin-top: 3px;
  }
  .empty-state .go-shelf {
    color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px;
  }
  .empty-state .go-shelf:hover { text-decoration: underline; }

  /* ===== Footer ===== */
  .my-footer { text-align: center; padding: 48px 0; color: var(--text-secondary); font-size: 14px; }
  .my-footer a { color: var(--accent); text-decoration: none; }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .my-hero { padding: 36px 16px 28px; }
    .my-hero h1 { font-size: 26px; }
    .stats-bar { gap: 24px; padding: 20px; }
    .stats-bar .stat-num { font-size: 24px; }
    .progress-grid { grid-template-columns: 1fr; }
    .my-container { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- Top Navigation -->
<nav class="top-nav" role="navigation" aria-label="站点导航">
  <span class="logo" aria-label="AI精读笔记"><a href="index.html" style="color:var(--accent);text-decoration:none;">📚 AI精读</a></span>
  <div class="nav-links">
    <a href="index.html" tabindex="0">🏠 书架首页</a>
    <a href="diagnose.html" tabindex="0">🔍 股票诊断</a>
    <a href="concepts.html" tabindex="0">🕸️ 概念地图</a>
    <a href="my.html" class="active" tabindex="0">📚 我的书架</a>
  </div>
  <button class="nav-toggle" onclick="this.classList.toggle('open');this.parentElement.querySelector('.nav-links').classList.toggle('open')" aria-label="菜单" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="my-container">

<!-- ==================== HERO ==================== -->
<header class="my-hero">
  <h1>📚 我的书架</h1>
  <p class="subtitle">你的阅读足迹与投资体系</p>
</header>

<!-- ==================== 统计条 ==================== -->
<div class="stats-bar" id="stats-bar" aria-label="阅读统计">
  <div class="stat-item">
    <div class="stat-num" id="stat-started">0/16</div>
    <div class="stat-label">已开始阅读</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="stat-chapters">0</div>
    <div class="stat-label">累计展开章节</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="stat-principles">0</div>
    <div class="stat-label">收藏的原则</div>
  </div>
</div>

<!-- ==================== 阅读进度区 ==================== -->
<section aria-labelledby="progress-title">
  <h2 class="my-section-title" id="progress-title">📖 阅读进度</h2>
  <p class="my-section-desc">进度按你在每本书中展开过的章节数计算，点击「继续阅读」回到书中。</p>
  <div class="progress-grid" id="progress-grid"></div>
</section>

<!-- ==================== 我的投资体系区 ==================== -->
<section class="principles-section" aria-labelledby="principles-title">
  <h2 class="my-section-title" id="principles-title">🏗️ 我的投资体系</h2>
  <p class="my-section-desc">在书籍页面点击要点旁的 ☆ 收藏原则，它们会汇聚成你自己的投资体系。</p>
  <div id="principles-container"></div>
</section>

</div><!-- .my-container -->

<!-- ==================== FOOTER ==================== -->
<footer class="my-footer" role="contentinfo">
  <p>📚 AI精读笔记 · 我的书架</p>
  <p style="margin-top:8px;">阅读进度与收藏原则保存在你的浏览器本地（localStorage），不上传任何数据。</p>
  <p style="margin-top:16px;font-size:13px;">
    <a href="index.html">🏠 书架首页</a> ·
    <a href="diagnose.html">🔍 股票诊断</a> ·
    <a href="concepts.html">🕸️ 概念地图</a>
  </p>
</footer>

<script>
(function() {
  'use strict';

  // ==================== 书目数据 ====================
  var BOOKS = [
    { slug: 'fisher', title: '怎样选择成长股', chapters: 8 },
    { slug: 'howard-marks', title: '投资最重要的事', chapters: 21 },
    { slug: 'buffett', title: '巴菲特之道', chapters: 8 },
    { slug: 'market-cycle', title: '周期', chapters: 18 },
    { slug: 'buffett-letters', title: '巴菲特致股东的信', chapters: 12 },
    { slug: 'alchemy-finance', title: '金融炼金术', chapters: 12 },
    { slug: 'poor-charlie', title: '穷查理宝典', chapters: 12 },
    { slug: 'intelligent-investor', title: '聪明的投资者', chapters: 20 },
    { slug: 'peter-lynch', title: '彼得·林奇的成功投资', chapters: 20 },
    { slug: 'security-analysis', title: '证券分析', chapters: 17 },
    { slug: 'beating-street', title: '战胜华尔街', chapters: 13 },
    { slug: 'stock-operator', title: '股票大作手回忆录', chapters: 24 },
    { slug: 'economic-moat', title: '巴菲特的护城河', chapters: 14 },
    { slug: 'fooled-by-randomness', title: '随机漫步的傻瓜', chapters: 14 },
    { slug: 'black-swan', title: '黑天鹅', chapters: 19 },
    { slug: 'antifragile', title: '反脆弱', chapters: 24 }
  ];

  // ==================== localStorage 安全读写 ====================
  function loadJSON(key, fallback) {
    try {
      var raw = localStorage.getItem(key);
      if (!raw) return fallback;
      var data = JSON.parse(raw);
      return data == null ? fallback : data;
    } catch (e) {
      return fallback;
    }
  }
  function saveJSON(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
      return true;
    } catch (e) {
      return false;
    }
  }

  function escapeHTML(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ==================== 阅读进度渲染 ====================
  function countChaptersRead(entry, total) {
    if (!entry || !Array.isArray(entry.chaptersRead)) return 0;
    var n = entry.chaptersRead.filter(function(id) { return /^ch\d+$/.test(String(id)); }).length;
    return Math.min(n, total);
  }

  function renderProgress() {
    var progress = loadJSON('reading_progress', {});
    if (typeof progress !== 'object' || Array.isArray(progress)) progress = {};
    var grid = document.getElementById('progress-grid');
    var html = '';
    var startedCount = 0;
    var totalChaptersRead = 0;

    BOOKS.forEach(function(book) {
      var entry = progress[book.slug];
      var started = !!(entry && (entry.visits > 0 || (Array.isArray(entry.chaptersRead) && entry.chaptersRead.length > 0)));
      var readCount = countChaptersRead(entry, book.chapters);
      var pct = book.chapters > 0 ? Math.round(readCount / book.chapters * 100) : 0;
      if (started) startedCount++;
      totalChaptersRead += readCount;

      if (started) {
        html += '<div class="progress-card">' +
          '<div class="book-title">《' + escapeHTML(book.title) + '》</div>' +
          '<div class="progress-track" role="progressbar" aria-valuenow="' + pct + '" aria-valuemin="0" aria-valuemax="100" aria-label="《' + escapeHTML(book.title) + '》阅读进度">' +
            '<div class="progress-fill" style="width:' + pct + '%"></div>' +
          '</div>' +
          '<div class="progress-meta">' +
            '<span>' + readCount + '/' + book.chapters + ' 章 · ' + pct + '%</span>' +
            '<a class="continue-link" href="books/' + book.slug + '/">继续阅读 →</a>' +
          '</div>' +
        '</div>';
      } else {
        html += '<div class="progress-card not-started">' +
          '<div class="book-title">《' + escapeHTML(book.title) + '》</div>' +
          '<div class="progress-track"><div class="progress-fill" style="width:0%"></div></div>' +
          '<div class="progress-meta">' +
            '<span class="status-text">未开始</span>' +
            '<a class="continue-link" href="books/' + book.slug + '/">开始阅读 →</a>' +
          '</div>' +
        '</div>';
      }
    });

    grid.innerHTML = html;
    document.getElementById('stat-started').textContent = startedCount + '/' + BOOKS.length;
    document.getElementById('stat-chapters').textContent = String(totalChaptersRead);
  }

  // ==================== 我的投资体系渲染 ====================
  var SAMPLE_PRINCIPLES = [
    { text: '买股票就是买公司的一部分，价格终将回归价值', book: '聪明的投资者' },
    { text: '在别人贪婪时恐惧，在别人恐惧时贪婪', book: '巴菲特之道' },
    { text: '最重要的不是预测未来，而是知道自己身处周期的什么位置', book: '周期' }
  ];

  function loadPrinciples() {
    var arr = loadJSON('my_principles', []);
    return Array.isArray(arr) ? arr : [];
  }

  function slugToTitle(slug) {
    for (var i = 0; i < BOOKS.length; i++) {
      if (BOOKS[i].slug === slug) return BOOKS[i].title;
    }
    return slug || '未知书籍';
  }

  function renderPrinciples() {
    var principles = loadPrinciples();
    var container = document.getElementById('principles-container');
    document.getElementById('stat-principles').textContent = String(principles.length);

    if (principles.length === 0) {
      var sampleHTML = '';
      SAMPLE_PRINCIPLES.forEach(function(s) {
        sampleHTML += '<div class="sample-item">' +
          '<span class="star">★</span>' +
          '<span>' + escapeHTML(s.text) + '<span style="color:#c0c0c0;">（《' + escapeHTML(s.book) + '》）</span></span>' +
          '<span class="sample-tag">示例</span>' +
        '</div>';
      });
      container.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-title">你的投资体系还是一张白纸 ✍️</div>' +
          '<div class="empty-desc">每位大师的智慧里，总有几条会击中你。去书里把它们摘下来，拼成你自己的体系——比如像这样：</div>' +
          '<div class="sample-list">' + sampleHTML + '</div>' +
          '<a class="go-shelf" href="index.html">去书架逛逛，开始收藏你的第一条原则 →</a>' +
        '</div>';
      return;
    }

    // 按书分组（保持收藏顺序）
    var groups = {};
    var order = [];
    principles.forEach(function(p, i) {
      if (!p || !p.text) return;
      var key = p.bookSlug || p.book || 'unknown';
      if (!groups[key]) {
        groups[key] = { name: p.book || slugToTitle(p.bookSlug), items: [] };
        order.push(key);
      }
      groups[key].items.push({ p: p, index: i });
    });

    var html = '';
    order.forEach(function(key) {
      var g = groups[key];
      var itemsHTML = '';
      g.items.forEach(function(item) {
        var chapterHTML = item.p.chapter
          ? '<div class="p-chapter">出自：' + escapeHTML(item.p.chapter) + '</div>'
          : '';
        itemsHTML += '<div class="principle-item">' +
          '<span class="star">★</span>' +
          '<div class="p-text">' + escapeHTML(item.p.text) + chapterHTML + '</div>' +
          '<button class="remove-btn" data-index="' + item.index + '" title="删除这条原则" aria-label="删除这条原则">×</button>' +
        '</div>';
      });
      html += '<div class="principle-group">' +
        '<div class="group-title">《' + escapeHTML(g.name) + '》<span class="count">' + g.items.length + ' 条</span></div>' +
        itemsHTML +
      '</div>';
    });

    html += '<button class="export-btn" id="export-btn">📋 导出我的体系</button>';
    container.innerHTML = html;

    // 删除按钮
    container.querySelectorAll('.remove-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var idx = parseInt(btn.getAttribute('data-index'), 10);
        var arr = loadPrinciples();
        if (isNaN(idx) || idx < 0 || idx >= arr.length) return;
        arr.splice(idx, 1);
        saveJSON('my_principles', arr);
        renderPrinciples();
      });
    });

    // 导出按钮
    var exportBtn = document.getElementById('export-btn');
    if (exportBtn) {
      exportBtn.addEventListener('click', function() {
        var arr = loadPrinciples();
        var lines = ['我的投资体系 — 摘自 AI精读笔记', ''];
        var byBook = {};
        var bookOrder = [];
        arr.forEach(function(p) {
          if (!p || !p.text) return;
          var name = p.book || slugToTitle(p.bookSlug);
          if (!byBook[name]) { byBook[name] = []; bookOrder.push(name); }
          byBook[name].push(p);
        });
        bookOrder.forEach(function(name) {
          lines.push('【《' + name + '》】');
          byBook[name].forEach(function(p) {
            var suffix = p.chapter ? '（' + p.chapter + '）' : '';
            lines.push('· ' + p.text + suffix);
          });
          lines.push('');
        });
        var textOut = lines.join('\n').trim() + '\n';

        function onCopied() {
          var original = exportBtn.textContent;
          exportBtn.textContent = '已复制 ✓';
          exportBtn.classList.add('copied');
          setTimeout(function() {
            exportBtn.textContent = original;
            exportBtn.classList.remove('copied');
          }, 2000);
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(textOut).then(onCopied, function() { fallbackCopy(textOut, onCopied); });
        } else {
          fallbackCopy(textOut, onCopied);
        }
      });
    }
  }

  function fallbackCopy(text, onSuccess) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-1000px;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    try {
      if (document.execCommand('copy')) onSuccess();
    } catch (e) { /* 复制失败静默 */ }
    document.body.removeChild(ta);
  }

  // ==================== 初始化 ====================
  renderProgress();
  renderPrinciples();
})();
</script>

</body>
</html>
